<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clave Group</title>

  <!-- Favicon -->
  <link href="/global/img/logos/favicon.ico" rel="icon">

  <!-- Politica de Privacidade -->
  <link rel="stylesheet" href="/fale-conosco/css/contato.css" />

  <!--/ Tailwind /-->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>

  <!--/ Fonts Icons Google /-->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,200,0,0" />

</head>

<body class="bg-agradecimento min-h-screen flex items-center justify-center px-4">

  <section class="text-white flex flex-col items-center justify-center gap-8 text-center w-full">

    <!-- Ícone -->

      <img class="w-32 sm:w-40 md:w-52" src="/fale-conosco/img/feixe-de-sorriso.svg" alt="Ícone sorriso">

    <!-- texto -->
    <div class="w-full max-w-4xl px-4 sm:px-6 md:px-10">

      <h1 class="font-black text-2xl sm:text-3xl md:text-5xl leading-tight break-words">
        Agradecemos pelo contato!
      </h1>

      <p class="font-light text-lg sm:text-xl md:text-3xl mt-6 md:mt-8 leading-relaxed break-words">
        Em breve um de nossos representantes <br> entrarão em contato com você!
      </p>

    </div>

    <!-- Botão -->
    <div>
      <a href="/espanhol/index.html"
        class="bg-green py-3 px-8 rounded-lg text-lg sm:text-xl md:text-2xl shadow-lg hover:scale-105 transition duration-300 inline-block">
        voltar para o site

    </div>

  </section>

</html>
